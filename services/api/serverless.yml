service: tombola-api
frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs20.x
  region: ${opt:region, 'eu-west-1'}
  stage: ${opt:stage, 'dev'}
  memorySize: 256
  timeout: 10
  environment:
    STAGE: ${self:provider.stage}
    TABLE_NAME: ${self:service}-${self:provider.stage}
    OTP_DELIVERY: ${env:OTP_DELIVERY, 'stub'}
    WHATSAPP_SECRET_ID: !Ref WhatsAppSecret
    USER_POOL_ID: !Ref UserPool
    USER_POOL_CLIENT_ID: !Ref UserPoolClient
    WHISH_NUMBER: ${env:WHISH_NUMBER, 'TBD'}
    RESERVATION_CAP: ${env:RESERVATION_CAP, '10'}
  httpApi:
    cors:
      allowedOrigins:
        - https://d5udiniaf9iiw.cloudfront.net
        - https://d7et0zxf5cp05.cloudfront.net
        - http://localhost:5173
      allowedHeaders:
        - Content-Type
        - Authorization
      allowedMethods:
        - GET
        - PUT
        - POST
        - DELETE
        - OPTIONS
    authorizers:
      cognitoJwt:
        type: jwt
        identitySource: $request.header.Authorization
        issuerUrl:
          Fn::Sub: https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}
        audience:
          - !Ref UserPoolClient
      adminJwt:
        type: jwt
        identitySource: $request.header.Authorization
        issuerUrl:
          Fn::Sub: https://cognito-idp.${AWS::Region}.amazonaws.com/${AdminUserPool}
        audience:
          - !Ref AdminUserPoolClient
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:BatchWriteItem
            - dynamodb:TransactWriteItems
            - dynamodb:Query
          Resource:
            - !GetAtt TombolaTable.Arn
            - !Sub '${TombolaTable.Arn}/index/*'
        - Effect: Allow
          Action: secretsmanager:GetSecretValue
          Resource: !Ref WhatsAppSecret
        - Effect: Allow
          Action:
            - cognito-idp:SignUp
            - cognito-idp:AdminConfirmSignUp
            - cognito-idp:AdminUpdateUserAttributes
            - cognito-idp:AdminGetUser
            - cognito-idp:AdminSetUserPassword
          Resource: !GetAtt UserPool.Arn

plugins:
  - serverless-esbuild

custom:
  esbuild:
    bundle: true
    minify: false
    target: node20
    format: esm
    platform: node
    outputFileExtension: .mjs
    banner:
      js: "import { createRequire } from 'module'; const require = createRequire(import.meta.url);"

functions:
  health:
    handler: src/handlers/health.handler
    events:
      - httpApi:
          path: /health
          method: get
  register:
    handler: src/handlers/auth.register
    events:
      - httpApi:
          path: /auth/register
          method: post
  verify:
    handler: src/handlers/auth.verify
    events:
      - httpApi:
          path: /auth/verify
          method: post
  resend:
    handler: src/handlers/auth.resend
    events:
      - httpApi:
          path: /auth/resend
          method: post
  forgot:
    handler: src/handlers/auth.forgot
    events:
      - httpApi:
          path: /auth/forgot
          method: post
  reset:
    handler: src/handlers/auth.reset
    events:
      - httpApi:
          path: /auth/reset
          method: post
  getMe:
    handler: src/handlers/me.getMe
    events:
      - httpApi:
          path: /me
          method: get
          authorizer:
            name: cognitoJwt
  updateMe:
    handler: src/handlers/me.updateMe
    events:
      - httpApi:
          path: /me
          method: put
          authorizer:
            name: cognitoJwt
  devOtp:
    handler: src/handlers/dev-otp.handler
    events:
      - httpApi:
          path: '/dev/otp/{phone}'
          method: get
  listTombolas:
    handler: src/handlers/tombolas.list
    events:
      - httpApi:
          path: /tombolas
          method: get
  getTombola:
    handler: src/handlers/tombolas.get
    events:
      - httpApi:
          path: '/tombolas/{id}'
          method: get
  tombolaNumbers:
    handler: src/handlers/tombolas.numbers
    events:
      - httpApi:
          path: '/tombolas/{id}/numbers'
          method: get
  adminListTombolas:
    handler: src/handlers/admin-tombolas.list
    events:
      - httpApi:
          path: /admin/tombolas
          method: get
          authorizer:
            name: adminJwt
  adminCreateTombola:
    handler: src/handlers/admin-tombolas.create
    events:
      - httpApi:
          path: /admin/tombolas
          method: post
          authorizer:
            name: adminJwt
  adminUpdateTombola:
    handler: src/handlers/admin-tombolas.update
    events:
      - httpApi:
          path: '/admin/tombolas/{id}'
          method: put
          authorizer:
            name: adminJwt
  adminDuplicateTombola:
    handler: src/handlers/admin-tombolas.duplicate
    events:
      - httpApi:
          path: '/admin/tombolas/{id}/duplicate'
          method: post
          authorizer:
            name: adminJwt
  adminDeleteTombola:
    handler: src/handlers/admin-tombolas.remove
    events:
      - httpApi:
          path: '/admin/tombolas/{id}'
          method: delete
          authorizer:
            name: adminJwt
  adminEditNumber:
    handler: src/handlers/admin-tombolas.editNumber
    events:
      - httpApi:
          path: '/admin/tombolas/{id}/numbers/{n}'
          method: put
          authorizer:
            name: adminJwt
  reserve:
    handler: src/handlers/reservations.reserve
    events:
      - httpApi:
          path: '/tombolas/{id}/reserve'
          method: post
          authorizer:
            name: cognitoJwt
  cancelReservation:
    handler: src/handlers/reservations.cancel
    events:
      - httpApi:
          path: '/tombolas/{id}/cancel'
          method: post
          authorizer:
            name: cognitoJwt
  myReservations:
    handler: src/handlers/reservations.mine
    events:
      - httpApi:
          path: /me/reservations
          method: get
          authorizer:
            name: cognitoJwt
  sweepExpired:
    handler: src/handlers/sweep.handler
    events:
      - schedule: rate(1 minute)

resources:
  Resources:
    TombolaTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - { AttributeName: PK, AttributeType: S }
          - { AttributeName: SK, AttributeType: S }
          - { AttributeName: GSI1PK, AttributeType: S }
          - { AttributeName: GSI1SK, AttributeType: S }
          - { AttributeName: GSI2PK, AttributeType: S }
          - { AttributeName: GSI2SK, AttributeType: S }
          - { AttributeName: GSI3PK, AttributeType: S }
          - { AttributeName: GSI3SK, AttributeType: S }
        KeySchema:
          - { AttributeName: PK, KeyType: HASH }
          - { AttributeName: SK, KeyType: RANGE }
        GlobalSecondaryIndexes:
          - IndexName: GSI1
            KeySchema:
              - { AttributeName: GSI1PK, KeyType: HASH }
              - { AttributeName: GSI1SK, KeyType: RANGE }
            Projection: { ProjectionType: ALL }
          - IndexName: GSI2
            KeySchema:
              - { AttributeName: GSI2PK, KeyType: HASH }
              - { AttributeName: GSI2SK, KeyType: RANGE }
            Projection: { ProjectionType: ALL }
          - IndexName: GSI3
            KeySchema:
              - { AttributeName: GSI3PK, KeyType: HASH }
              - { AttributeName: GSI3SK, KeyType: RANGE }
            Projection: { ProjectionType: ALL }
        TimeToLiveSpecification:
          AttributeName: ttl
          Enabled: true
    WhatsAppSecret:
      Type: AWS::SecretsManager::Secret
      Properties:
        Name: tombola/whatsapp/${self:provider.stage}
        SecretString: '{"phoneNumberId":"","accessToken":"","templateName":"tombola_otp"}'
    UserPool:
      Type: AWS::Cognito::UserPool
      Properties:
        UserPoolName: tombola-${self:provider.stage}
        UsernameAttributes: [phone_number]
        Policies:
          PasswordPolicy:
            MinimumLength: 8
            RequireLowercase: true
            RequireNumbers: true
            RequireUppercase: false
            RequireSymbols: false
        Schema:
          - { Name: name, AttributeDataType: String, Mutable: true, Required: true }
          - { Name: locale, AttributeDataType: String, Mutable: true, Required: false }
    UserPoolClient:
      Type: AWS::Cognito::UserPoolClient
      Properties:
        UserPoolId: !Ref UserPool
        ClientName: tombola-web-${self:provider.stage}
        GenerateSecret: false
        ExplicitAuthFlows: [ALLOW_USER_SRP_AUTH, ALLOW_REFRESH_TOKEN_AUTH]
    AdminGroup:
      Type: AWS::Cognito::UserPoolGroup
      Properties:
        GroupName: admin
        UserPoolId: !Ref UserPool
    AdminUserPool:
      Type: AWS::Cognito::UserPool
      Properties:
        UserPoolName: tombola-admin-${self:provider.stage}
        UsernameAttributes: [email]
        AdminCreateUserConfig:
          AllowAdminCreateUserOnly: true
        Policies:
          PasswordPolicy:
            MinimumLength: 8
            RequireLowercase: true
            RequireNumbers: true
            RequireUppercase: false
            RequireSymbols: false
        Schema:
          - { Name: name, AttributeDataType: String, Mutable: true, Required: false }
    AdminUserPoolClient:
      Type: AWS::Cognito::UserPoolClient
      Properties:
        UserPoolId: !Ref AdminUserPool
        ClientName: tombola-admin-${self:provider.stage}
        GenerateSecret: false
        ExplicitAuthFlows: [ALLOW_USER_SRP_AUTH, ALLOW_REFRESH_TOKEN_AUTH]
  Outputs:
    ApiBaseUrl:
      Value: !GetAtt HttpApi.ApiEndpoint
    UserPoolId:
      Value: !Ref UserPool
    UserPoolClientId:
      Value: !Ref UserPoolClient
    AdminUserPoolId:
      Value: !Ref AdminUserPool
    AdminUserPoolClientId:
      Value: !Ref AdminUserPoolClient
